#################################
### Elysium's Hyprland config ###
#################################

debug {
  disable_logs = false
  damage_tracking = 2
}

################
### MONITORS ###
################

monitor=eDP-1,1920x1080@60,0x0,1


xwayland {
  force_zero_scaling = true
}

###################
### MY PROGRAMS ###
###################

$terminal = kitty
$fileManager = pcmanfm-qt
#$menu = rofi -show drun
$menu = hyprlauncher
$browser = zen-browser
$powermenu = wlogout -b 2

#############################
### ENVIRONMENT VARIABLES ###
#############################

# XDG Portals
env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland
env = XDG_SESSION_DESKTOP,Hyprland

# GTK
env = XCURSOR_THEME,Bibata-Modern-Classic
env = XCURSOR_SIZE,24
env = GDK_BACKEND,wayland,x11,*

# QT
env = QT_QPA_PLATFORM,wayland;xcb
env = QT_QPA_PLATFORMTHEME,qt5ct
env = QT_WAYLAND_DISABLE_WINDOWDECORATION,1
env = QT_AUTO_SCREEN_SCALE_FACTOR,1
env = ELECTRON_OZONE_PLATFORM_HINT,wayland
env = PATH,/usr/lib/qt6/bin:/usr/local/bin:/usr/bin

# env = SDL_VIDEODRIVER,wayland
env = CLUTTER_BACKEND,wayland

# File association in dolphin.
env = XDG_MENU_PREFIX,plasma-

#################
### AUTOSTART ###
#################

# Panel / system tray / notifications
exec-once = $terminal
exec-once = qs
exec-once = nm-applet &
exec-once = blueman-applet &
exec-once = mako
exec-once = mpd

# Hyprland ecosystem
# exec-once = hyprpm reload -n
exec-once = hyprsunset
exec-once = hypridle
exec-once = systemctl --user start hyprpolkitagent
exec-once = hyprlauncher -d

# Apps / services
exec-once = awww-daemon
exec-once = vesktop --start-minimized
# exec-once = steam -silent
exec-once = syncthing --no-browser
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store
exec-once = cliphist wipe
exec-once = udiskie

#####################
### LOOK AND FEEL ###
#####################

general {
    gaps_in = 4
    gaps_out = 8
    border_size = 2
    col.active_border = rgb(7aa2f7)
    col.inactive_border = rgb(414868)
    resize_on_border = false
    allow_tearing = true
    layout = dwindle
}

#quirks {
#  prefer_hdr = false
#}

render {
  cm_fs_passthrough = 0
  cm_auto_hdr = 0
}

decoration {
    rounding = 8
    active_opacity = 1.0
    inactive_opacity = 0.9
    fullscreen_opacity = 1.0
    shadow {
        enabled = true
        range = 4
        render_power = 2
        color = rgb(1a1b26)
    }
  blur {
    enabled = true
    size = 6
    passes = 2
    new_optimizations = true
    ignore_opacity = true
    xray = false
    popups = true
  }
}

animations {
    enabled = yes, please :)

    # Default curves, see https://wiki.hypr.land/Configuring/Animations/#curves
    #        NAME,           X0,   Y0,   X1,   Y1
    bezier = easeOutQuint,   0.23, 1,    0.32, 1
    bezier = easeInOutCubic, 0.65, 0.05, 0.36, 1
    bezier = linear,         0,    0,    1,    1
    bezier = almostLinear,   0.5,  0.5,  0.75, 1
    bezier = quick,          0.15, 0,    0.1,  1

    # Default animations, see https://wiki.hypr.land/Configuring/Animations/
    #           NAME,          ONOFF, SPEED, CURVE,        [STYLE]
    animation = global,        1,     10,    default
    animation = border,        1,     5.39,  easeOutQuint
    animation = windows,       1,     4.79,  easeOutQuint
    animation = windowsIn,     1,     4.1,   easeOutQuint, popin 87%
    animation = windowsOut,    1,     1.49,  linear,       popin 87%
    animation = fadeIn,        1,     1.73,  almostLinear
    animation = fadeOut,       1,     1.46,  almostLinear
    animation = fade,          1,     3.03,  quick
    animation = layers,        1,     3.81,  easeOutQuint
    animation = layersIn,      1,     4,     easeOutQuint, fade
    animation = layersOut,     1,     1.5,   linear,       fade
    animation = fadeLayersIn,  1,     1.79,  almostLinear
    animation = fadeLayersOut, 1,     1.39,  almostLinear
    animation = workspaces,    1,     1.94,  almostLinear, fade
    animation = workspacesIn,  1,     1.21,  almostLinear, fade
    animation = workspacesOut, 1,     1.94,  almostLinear, fade
    animation = zoomFactor,    1,     7,     quick
}

dwindle {
    pseudotile = true # Master switch for pseudotiling. Enabling is bound to mainMod + P in the keybinds section below
    preserve_split = true # You probably want this
}

master {
  new_status = slave
  #master_ratio = .75
  #master_side = left
}

misc {
    force_default_wallpaper = 1 # Set to 0 or 1 to disable the anime mascot wallpapers
    disable_hyprland_logo = true # If true disables the random hyprland logo / anime girl background. :(
    vfr = true
    render_unfocused_fps = 60
    disable_splash_rendering = false
}

#############
### INPUT ###
#############

# https://wiki.hyprland.org/Configuring/Variables/#input
input {
    kb_layout = us
    kb_variant = altgr-intl

    follow_mouse = 1
    sensitivity = 0 # -1.0 - 1.0, 0 means no modification.
    accel_profile = flat
    touchpad {
        natural_scroll = true
    }
}

device {
  name = at-translated-set-2-keyboard
  kb_layout = br
  kb_variant = abnt2
}

device {
  name = crq1080:00-0488:1014-touchpad
  sensitivity = 0
  accel_profile = adaptive
  disable_while_typing = false
}

cursor {
  no_hardware_cursors = true
}

####################
### KEYBINDINGSS ###
####################

$mainMod = SUPER # Sets "Windows" key as main modifier

bind = $mainMod, return, exec, $terminal
bind = $mainMod SHIFT, Q, killactive,
bind = $mainMod, M, exec, $powermenu
bind = $mainMod SHIFT, E, exec, $fileManager
bind = $mainMod, E, exec, $terminal -e yazi
bind = $mainMod, V, togglefloating,
bind = $mainMod, D, exec, $menu
bind = $mainMod, F, fullscreen, 1
bind = $mainMod, P, pseudo, # dwindle
bind = $mainMod, J, togglesplit, # dwindle
bind = $mainMod, B, exec, $browser
bind = $mainMod SHIFT, B, exec, $browser -p
bind = $mainMod, T, exec, $terminal -e btop
bind = $mainMod SHIFT, V, exec, cliphist list | wofi -n --dmenu --pre-display-cmd "echo '%s' | cut -f 2" | cliphist decode | wl-copy

# Move focus with mainMod + arrow keys
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

#FN keys
bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = ,XF86MonBrightnessUp, exec, brightnessctl set 5%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl set 5%-
bindl = ,XF86AudioNext, exec, playerctl next
bindl = ,XF86AudioPause, exec, playerctl play-pause
bindl = ,XF86AudioPlay, exec, playerctl play-pause
bindl = ,XF86AudioPrev, exec, playerctl previous

# Screenshot
bind = $mainMod SHIFT, S, exec, grim -g "$(slurp -d)" - | wl-copy

#Lockscreen
bind = $mainMod, L, exec, hyprlock

#Change Wallpaper script
bind = $mainMod, W, exec, ~/.config/hypr/scripts/wallpaper.sh

##############################
### WINDOWS AND WORKSPACES ###
##############################

# Ignore maximize requests
windowrule {
  name = windowrule-1
  suppress_event = maximize
  match:class = .*
}


# Fix XWayland dragging issues
windowrule {
  name = windowrule-2
  no_focus = on
  match:class = ^$
  match:title = ^$
  match:xwayland = 1
  match:float = 1
  match:fullscreen = 0
  match:pin = 0
}


# Workspace 4 uses master layout
workspace = 4, layout:master

# Discord / Vesktop → workspace 4
windowrule {
  name = windowrule-3
  workspace = 4
  match:class = ^(vesktop)$
}

windowrule {
  name = windowrule-4
  workspace = 4
  match:class = ^(discord)$
}


# Telegram → workspace 4
windowrule {
  name = windowrule-5
  workspace = 4
  match:class = ^(org.telegram.desktop)$
}


# Youtube Music → workspace 5
windowrule {
  name = windowrule-6
  workspace = 5
  match:class = ^(com.github.th_ch.youtube_music)$
}


# Steam → workspace 9
windowrule {
  name = windowrule-7
  workspace = 9
  match:class = ^(steam)$
}


# Steam games (steam_app_123456) → workspace 10 fullscreen no border
windowrule {
  name = windowrule-8
  workspace = 10
  fullscreen = on
  border_size = 0
  match:class = ^steam_app_[0-9]+$
}


# Dota 2
windowrule {
  name = windowrule-9
  workspace = 10
  fullscreen = on
  match:class = ^(dota2)$
}


# CS2
windowrule {
  name = windowrule-10
  workspace = 10
  match:class = ^(cs2)$
}

windowrule {
  name = windowrule-11
  workspace = 10
  match:title = ^(Counter-Strike 2)$
}


# Baldur's Gate 3
windowrule {
  name = windowrule-12
  workspace = 10
  match:class = ^(bg3)$
}


# Render unfocused
windowrule {
  name = windowrule-13
  render_unfocused = on
  match:workspace = 10
}

windowrule {
  name = windowrule-14
  render_unfocused = on
  match:class = ^(steam_app_|lutris|heroic|gamescope)$
}


# Blur waybar
layerrule {
  name = layerrule-1
  blur = on
  match:namespace = namespace:waybar
}

windowrule {
    name = gaming_workspace
    match:workspace = 10
    rounding = 0
    opacity = 1
    no_blur = true
    no_anim = true
    opaque = true
    no_shadow = true
    decorate = off
  }


plugin {
    csgo-vulkan-fix {
        fix_mouse = false

        vkfix-app = cs2, 1440, 1080
    }
}
