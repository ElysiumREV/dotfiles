#################################
### Elysium's Hyprland config ###
#################################

debug {
  disable_logs = false
  damage_tracking = 2
}

################
### MONITORS ###
################

monitorv2 {
  output = DP-3
  mode = 1920x1080@144
  position = 0x0
  scale = 1
}

xwayland {
  force_zero_scaling = true
}

###################
### MY PROGRAMS ###
###################

$terminal = kitty
$fileManager = pcmanfm-qt
$menu = wofi -n
$browser = firefox
$powermenu = wlogout -b 2

#############################
### ENVIRONMENT VARIABLES ###
#############################

# XDG Portals
#env = XDG_CURRENT_DESKTOP,Hyprland
#env = XDG_SESSION_TYPE,wayland
#env = XDG_SESSION_DESKTOP,Hyprland

#env = TERMINAL,alacritty
#env = WLR_RENDERER,vulkan

# QT
#env = QT_QPA_PLATFORM,wayland;xcb
#env = QT_QPA_PLATFORMTHEME,qt6ct
#env = QT_WAYLAND_DISABLE_WINDOWDECORATION,1
#env = QT_AUTO_SCREEN_SCALE_FACTOR,1
#env = ELECTRON_OZONE_PLATFORM_HINT,wayland

#################
### AUTOSTART ###
#################

# Panel / system tray / notifications
exec-once = $terminal
exec-once = waybar
exec-once = nm-applet &
exec-once = blueman-applet &
exec-once = mako
exec-once = mpd

# Hyprland ecosystem
exec-once = hyprpm reload -n
exec-once = hyprsunset
exec-once = hypridle
exec-once = systemctl --user start hyprpolkitagent
exec-once = hyprpaper
exec-once = hyprlauncher -d

# Apps / services
exec-once = vesktop --start-minimized
exec-once = steam -silent
exec-once = syncthing --no-browser
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store
exec-once = cliphist wipe

#####################
### LOOK AND FEEL ###
#####################

general {
    gaps_in = 4
    gaps_out = 8
    border_size = 2
    col.active_border = rgb(dcd7d7)
    col.inactive_border = rgb(000F08)
    resize_on_border = true
    allow_tearing = true
    layout = dwindle
}

decoration {
    rounding = 0
    active_opacity = 1.0
    inactive_opacity = 0.9
    fullscreen_opacity = 1.0
    shadow {
        enabled = true
        range = 4
        render_power = 2
        color = rgba(1a1a1aee)
    }
    blur {
        enabled = true
        size = 4
        passes = 2
        new_optimizations = true
        ignore_opacity = true
        xray = false
        popups = true
    }
}

animations {
  enabled = true
  bezier = linear, 0, 0, 1, 1
  bezier = md3_standard, 0.2, 0, 0, 1
  bezier = md3_decel, 0.05, 0.7, 0.1, 1
  bezier = md3_accel, 0.3, 0, 0.8, 0.15
  bezier = overshot, 0.05, 0.9, 0.1, 1.1
  bezier = crazyshot, 0.1, 1.5, 0.76, 0.92
  bezier = hyprnostretch, 0.05, 0.9, 0.1, 1.0
  bezier = fluent_decel, 0.1, 1, 0, 1
  bezier = easeInOutCirc, 0.85, 0, 0.15, 1
  bezier = easeOutCirc, 0, 0.55, 0.45, 1
  bezier = easeOutExpo, 0.16, 1, 0.3, 1
  animation = windows, 1, 3, md3_decel, popin 60%
  animation = border, 1, 10, default
  animation = fade, 1, 2.5, md3_decel
  animation = workspaces, 1, 3.5, easeOutExpo, slide
  animation = specialWorkspace, 1, 3, md3_decel, slidevert
}

dwindle {
    pseudotile = true # Master switch for pseudotiling. Enabling is bound to mainMod + P in the keybinds section below
    preserve_split = true # You probably want this
}

master {
    new_status = master
}

misc {
    force_default_wallpaper = 1 # Set to 0 or 1 to disable the anime mascot wallpapers
    disable_hyprland_logo = true # If true disables the random hyprland logo / anime girl background. :(
    vfr = false
    render_unfocused_fps = 60
    disable_splash_rendering = false
}

#############
### INPUT ###
#############

# https://wiki.hyprland.org/Configuring/Variables/#input
input {
    kb_layout = us
    kb_variant = altgr-intl

    follow_mouse = 1
    sensitivity = 0 # -1.0 - 1.0, 0 means no modification.
    accel_profile = flat
    touchpad {
        natural_scroll = true
    }
}

cursor {
  no_hardware_cursors = true
}

####################
### KEYBINDINGSS ###
####################

$mainMod = SUPER # Sets "Windows" key as main modifier

bind = $mainMod, return, exec, $terminal
bind = $mainMod SHIFT, Q, killactive,
bind = $mainMod, M, exec, $powermenu
bind = $mainMod SHIFT, F, exec, $fileManager
bind = $mainMod, F, exec, $terminal -e yazi
bind = $mainMod, V, togglefloating,
bind = $mainMod, D, exec, $menu
bind = $mainMod, E, exec, wofimoji
bind = $mainMod, P, pseudo, # dwindle
bind = $mainMod, J, togglesplit, # dwindle
bind = $mainMod, B, exec, $browser
bind = $mainMod, T, exec, $terminal -e btop
bind = $mainMod SHIFT, V, exec, cliphist list | wofi --dmenu --pre-display-cmd "echo '%s' | cut -f 2" | cliphist decode | wl-copy

# Move focus with mainMod + arrow keys
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

#FN keys
bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = ,XF86MonBrightnessUp, exec, brightnessctl -e4 -n2 set 5%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl -e4 -n2 set 5%-
bindl = ,XF86AudioNext, exec, playerctl next
bindl = ,XF86AudioPause, exec, playerctl play-pause
bindl = ,XF86AudioPlay, exec, playerctl play-pause
bindl = ,XF86AudioPrev, exec, playerctl previous

# Screenshot
bind = $mainMod SHIFT, S, exec, grim -g "$(slurp -d)" - | wl-copy

#Lockscreen
bind = $mainMod, L, exec, hyprlock

#Change Wallpaper script
bind = $mainMod, W, exec, ~/.config/hypr/scripts/wallpaper.sh

##############################
### WINDOWS AND WORKSPACES ###
##############################
# Ignore maximize requests from apps. You'll probably like this.
windowrule = suppress_event maximize, match:class .*

# Fix some dragging issues with XWayland
windowrule = no_focus on, match:class ^$, match:title ^$, match:xwayland 1, match:float 1, match:fullscreen 0, match:pin 0

#Discord sempre abre no workspace 4
windowrule = workspace 4, match:class ^(vesktop)$
windowrule = workspace 4, match:class ^(discord)$

#Telegram sempre abre no workspace 4
windowrule = workspace 4, match:class ^(org.telegram.desktop)$

#Youtube music no workspace 5
windowrule = workspace 5, match:class ^(com.github.th_ch.youtube_music)$

# Steam sempre abre no workspace 9
windowrule = workspace 9, match:class ^(steam)$
# Jogos da Steam com classe padrão (steam_app_123456)
windowrule = workspace 10, fullscreen on, border_size 0, immediate on, match:class ^steam_app_\d+$

# Jogos específicos com classe própria
windowrule = workspace 10, fullscreen on, match:class ^dota2$
windowrule = workspace 10, immediate on, match:class ^(cs2)$
windowrule = workspace 10, match:title ^(Counter-Strike 2)$
windowrule = render_unfocused on, match:workspace 10
windowrule = workspace on, match:class ^(bg3)$
windowrule = render_unfocused on, match:class ^(steam_app_|lutris|heroic|gamescope)$

layerrule = blur on, match:namespace waybar
layerrule = blur on, ignore_alpha 0.3, match:namespace swaync-notification-window
layerrule = blur on, ignore_alpha 0.7, match:namespace swaync-control-center

plugin {
    csgo-vulkan-fix {
        fix_mouse = false

        vkfix-app = cs2, 1440, 1080
    }
}

