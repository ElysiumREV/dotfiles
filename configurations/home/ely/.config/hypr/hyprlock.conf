background {
    monitor =
    path = /home/ely/Pictures/Wallpapers/.current-wallpaper.png
    blur_size = 5
    blur_passes = 3
    brightness = 0.55
}

input-field {
    monitor =
    size = 6%, 4%
    outline_thickness = 0
    dots_rounding = 4
    dots_spacing = 0.5
    inner_color = rgba(19, 21, 26, 0.95)
    outer_color = rgba(19, 21, 26, 0.95)
    check_color = rgba(126, 189, 155, 1.0)
    fail_color = rgba(196, 122, 122, 1.0)
    font_color = rgba(212, 197, 176, 1.0)
    font_family = JetBrains Mono Nerd Font
    fade_on_empty = false
    shadow_color = rgba(0, 0, 0, 0.6)
    shadow_passes = 2
    shadow_size = 2
    rounding = 20
    placeholder_text = <i></i>
    fail_text = <b>FAIL</b>
    position = 0, -100
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:1000] date +"<b>%H</b>"
    color = rgba(126, 163, 204, 1.0)
    font_size = 200
    font_family = JetBrains Mono Nerd Font
    shadow_passes = 0
    shadow_size = 5
    position = -120, 410
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:1000] date +"<b>%M</b>"
    color = rgba(160, 142, 196, 0.8)
    font_size = 200
    font_family = JetBrains Mono Nerd Font
    shadow_passes = 0
    shadow_size = 5
    position = 120, 230
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:1000] date +"<b>%A, %B %d, %Y</b>"
    color = rgba(212, 197, 176, 1.0)
    font_size = 40
    font_family = JetBrains Mono Nerd Font
    shadow_passes = 0
    shadow_size = 4
    position = 0, -200
    halign = center
    valign = center
}

label {
    monitor =
    text = It's okay to take some time off!
    color = rgba(212, 197, 176, 1.0)
    font_size = 24
    font_family = JetBrains Mono Nerd Font
    position = 0, 100
    halign = center
    valign = center
}
