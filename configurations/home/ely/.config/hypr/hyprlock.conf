background {
    monitor =
    path = /home/ely/Pictures/Wallpapers/.current-wallpaper.png
    blur_size = 5
    blur_passes = 3
    brightness = 0.55
}

input-field {
    monitor =
    size = 6%, 4%
    outline_thickness = 0
    dots_rounding = 4
    dots_spacing = 0.5
    inner_color = rgba(39, 40, 34, 0.9)    # monokai bg
    outer_color = rgba(39, 40, 34, 0.9)    # monokai bg
    check_color = rgba(230, 219, 116, 1.0) # monokai yellow
    fail_color = rgba(249, 38, 114, 1.0)   # monokai red
    font_color = rgba(248, 248, 242, 1.0)  # monokai fg
    font_family = JetBrains Mono Nerd Font
    fade_on_empty = false
    shadow_color = rgba(0, 0, 0, 0.6)
    shadow_passes = 2
    shadow_size = 2
    rounding = 20
    placeholder_text = <i></i>
    fail_text = <b>FAIL</b>
    position = 0, -100
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:1000] date +"<b>%H</b>"
    color = rgba(102, 217, 239, 1.0)       # monokai cyan
    font_size = 200
    font_family = JetBrains Mono Nerd Font
    shadow_passes = 0
    shadow_size = 5
    position = -120, 410
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:1000] date +"<b>%M</b>"
    color = rgba(174, 129, 255, 0.6)       # monokai purple, dimmed
    font_size = 200
    font_family = JetBrains Mono Nerd Font
    shadow_passes = 0
    shadow_size = 5
    position = 120, 230
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:1000] date +"<b>%A, %B %d, %Y</b>"
    color = rgba(248, 248, 242, 1.0)       # monokai fg
    font_size = 40
    font_family = JetBrains Mono Nerd Font
    shadow_passes = 0
    shadow_size = 4
    position = 0, -200
    halign = center
    valign = center
}

label {
    monitor =
    text = Hi there! $USER
    color = rgba(248, 248, 242, 1.0)       # monokai fg
    font_size = 24
    font_family = JetBrains Mono Nerd Font
    position = 0, 100
    halign = center
    valign = center
}