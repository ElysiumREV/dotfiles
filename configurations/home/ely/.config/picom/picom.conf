# ============================================================
# picom.conf — espelhando o decoration do Hyprland
# ============================================================

# Backend (recomendado para AMD/RADV)
backend = "glx";
vsync = true;

# ============================================================
# ROUNDING (equivalente ao rounding = 10)
# ============================================================

corner-radius = 10;
rounded-corners-exclude = [
    "class_g = 'i3bar'",
    "class_g = 'Polybar'",
    # Jogos — sem rounding
    "class_g = 'steam_app_'",
    "class_g = 'cs2'",
    "class_g = 'dota2'",
];

# ============================================================
# SOMBRA (equivalente ao shadow: range=50, render_power=10)
# ============================================================

shadow = true;
shadow-radius = 50;
shadow-opacity = 0.53;   # rgba(13,15,26,136) → ~0.53
shadow-offset-x = -15;
shadow-offset-y = -15;
shadow-color = "#13151a";

shadow-exclude = [
    "class_g = 'i3bar'",
    "class_g = 'Polybar'",
    "name = 'Notification'",
    # Workspace 10 (jogos)
    "class_g = 'steam_app_'",
];

# ============================================================
# OPACIDADE (equivalente ao inactive_opacity = 0.8)
# ============================================================

active-opacity = 1.0;
inactive-opacity = 0.8;
frame-opacity = 1.0;
inactive-opacity-override = false;

opacity-rule = [
    # Jogos e Unity/Unreal — sempre 1.0
    "100:class_g = 'steam_app_'",
    "100:class_g = 'cs2'",
    "100:class_g = 'dota2'",
    "100:class_g = 'Unity'",
    "100:class_g = 'unreal'",
    # Terminal sempre visível
    "100:class_g = 'kitty' && focused",
    "90:class_g = 'kitty' && !focused",
];

# ============================================================
# BLUR (equivalente ao blur: size=10, passes=3)
# ============================================================

blur-method = "dual_kawase";
blur-strength = 10;
blur-background = true;
blur-background-frame = true;
blur-background-fixed = false;

blur-background-exclude = [
    "window_type = 'dock'",
    "window_type = 'desktop'",
    "class_g = 'slop'",
    # Jogos
    "class_g = 'steam_app_'",
    "class_g = 'cs2'",
    "class_g = 'dota2'",
    "class_g = 'Unity'",
    "class_g = 'unreal'",
];

# ============================================================
# ANIMAÇÕES (picom-animations fork — opcional)
# Se usar o picom padrão do Arch, remova esta seção.
# Para animações similares ao Hyprland, instale:
#   yay -S picom-animations-git
# ============================================================

# animations = true;
# animation-stiffness = 200;
# animation-dampening = 25;
# animation-mass = 1;
# animation-for-open-window = "zoom";
# animation-for-unmap-window = "zoom";
# animation-for-workspace-switch-in = "slide-left";
# animation-for-workspace-switch-out = "slide-right";

# ============================================================
# MISC
# ============================================================

# Marca janelas com _NET_WM_BYPASS_COMPOSITOR para jogos
unredir-if-possible = true;
unredir-if-possible-exclude = [];

# Refresh rate detection automática
refresh-rate = 0;

# Logging
log-level = "warn";
